name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Rank-order query check
        run: pnpm check:rank-order

      - name: Rank-order checker self-test
        run: pnpm test:rank-order-check

      - name: RLS coverage check
        run: pnpm check:rls-coverage

      - name: Seed verification (skips if local Supabase unavailable)
        run: pnpm verify:seed
