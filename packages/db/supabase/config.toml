# EduAI local Supabase stack — run from packages/db after installing the CLI:
#   pnpm db:start

project_id = "eduai-local"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = false

[auth.email]
# Must stay enabled for password sign-in. Public self-signup is gated by
# [auth].enable_signup = false; identities are admin-provisioned only.
enable_signup = true
enable_confirmations = false
